name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flet
      - run: flet build apk main.py
      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/apk/*.apk
